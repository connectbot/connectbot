name: PR Checks

on:
  pull_request:
    branches: [ main ]
  merge_group:
    types: [ checks_requested ]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  changes:
    name: Check changed files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      needs_ci: ${{ steps.changed-files.outputs.needs_ci }}
      needs_docs: ${{ steps.changed-files.outputs.needs_docs }}

    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Check changed files
        id: changed-files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            echo "needs_ci=true" >> "$GITHUB_OUTPUT"
            echo "needs_docs=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          needs_ci=false
          needs_docs=false
          merge_base="$(git merge-base "${BASE_SHA}" "${HEAD_SHA}")"

          while IFS= read -r file; do
            case "${file}" in
              *.md|.gitignore|.gitattributes|LICENSE|.java-version|icons/*)
                needs_docs=true
                ;;
              *)
                needs_ci=true
                ;;
            esac
          done < <(git diff --name-only "${merge_base}" "${HEAD_SHA}")

          echo "needs_ci=${needs_ci}" >> "$GITHUB_OUTPUT"
          echo "needs_docs=${needs_docs}" >> "$GITHUB_OUTPUT"

  docs:
    name: Lint documentation
    needs: changes
    if: needs.changes.outputs.needs_docs == 'true'
    uses: ./.github/workflows/ci-docs.yml
    secrets: inherit

  ci:
    name: CI
    needs: changes
    if: needs.changes.outputs.needs_ci == 'true'
    uses: ./.github/workflows/ci-build.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      is_push: false
    secrets: inherit

  required:
    name: Required
    runs-on: ubuntu-latest
    needs: [changes, docs, ci]
    if: always()

    steps:
      - name: Check required jobs
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          NEEDS_CI: ${{ needs.changes.outputs.needs_ci }}
          NEEDS_DOCS: ${{ needs.changes.outputs.needs_docs }}
          CI_RESULT: ${{ needs.ci.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
        run: |
          failed=false

          if [[ "${CHANGES_RESULT}" != "success" ]]; then
            echo "Changed file detection result was ${CHANGES_RESULT}"
            failed=true
          fi

          if [[ "${NEEDS_DOCS}" == "true" && "${DOCS_RESULT}" != "success" ]]; then
            echo "Documentation lint result was ${DOCS_RESULT}"
            failed=true
          fi

          if [[ "${NEEDS_CI}" == "true" && "${CI_RESULT}" != "success" ]]; then
            echo "CI result was ${CI_RESULT}"
            failed=true
          fi

          if [[ "${failed}" == "true" ]]; then
            exit 1
          fi

          echo "Required PR checks passed"
