name: Check Translations

on:
  pull_request:
    branches: [main]
    paths:
      - "app/src/main/res/values-*/strings.xml"

jobs:
  check:
    name: Verify machine_translated flag
    runs-on: ubuntu-latest
    if: github.actor != 'kruton'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for machine_translated flag on human translations
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, subprocess, sys

          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["GITHUB_REPOSITORY"]
          base = os.environ.get("GITHUB_BASE_REF", "main")

          diff = subprocess.run(
              ["git", "diff", f"origin/{base}...HEAD", "--",
               "app/src/main/res/values-*/strings.xml"],
              capture_output=True, text=True, check=True,
          ).stdout

          tag_re = re.compile(r"<(string|string-array|plurals)[\s>]")
          flag_re = re.compile(r'tools:machine_translated="true"')
          path_re = re.compile(r"app/src/main/res/values-[^/]+/strings\.xml")

          problem_files: set[str] = set()
          current_file = None

          for line in diff.splitlines():
              if line.startswith("+++ b/"):
                  path = line[6:]
                  current_file = path if path_re.search(path) else None
              elif line.startswith("+") and not line.startswith("+++") and current_file:
                  added = line[1:]
                  if tag_re.search(added) and flag_re.search(added):
                      problem_files.add(current_file)

          if not problem_files:
              print("No machine_translated flags found on added strings. OK.")
              sys.exit(0)

          files_list = "\n".join(f"- `{f}`" for f in sorted(problem_files))
          marker = "<!-- connectbot-machine-translated-warning -->"
          body = (
              f"{marker}\n"
              "⚠️ It looks like you are submitting a human translation. "
              "Please ensure `tools:machine_translated` is removed, otherwise "
              "the automated LLM script may overwrite your work.\n\n"
              f"Affected files:\n{files_list}"
          )
          print(body)

          comments = subprocess.run(
              ["gh", "api", f"repos/{repo}/issues/{pr_number}/comments?per_page=100"],
              capture_output=True, text=True,
          )
          comment_id = None
          if comments.returncode == 0:
              for comment in json.loads(comments.stdout):
                  if marker in comment.get("body", ""):
                      comment_id = comment["id"]
                      break

          if comment_id is not None:
              comment = subprocess.run(
                  ["gh", "api", "--method", "PATCH",
                   f"repos/{repo}/issues/comments/{comment_id}",
                   "-f", f"body={body}"],
              )
          else:
              comment = subprocess.run(
                  ["gh", "pr", "comment", pr_number, "--body", body, "--repo", repo],
              )

          if comment.returncode == 0:
              print(f"Updated warning comment on PR #{pr_number}.")
          else:
              print("Could not leave a PR comment; failing with the warning above.")
          sys.exit(1)
          PYEOF
