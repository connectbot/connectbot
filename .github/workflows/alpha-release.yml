name: Alpha Release

on:
  push:
    branches: [ fido2 ]

jobs:
  build:
    name: Build alpha APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (with history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Delete old Android SDK cmdline-tools
        run: |
          rm -rf $ANDROID_HOME/cmdline-tools/latest

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          cmdline-tools-version: '13114758'
          packages: 'cmdline-tools;latest tools platform-tools'

      - name: Build ConnectBot
        run: ./gradlew assembleOssRelease assembleGoogleRelease assembleOssDebug assembleGoogleDebug

      - name: Prepare release artifacts
        id: prep
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="alpha-fido2-${SHORT_SHA}"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"

          cp ./app/build/outputs/apk/oss/release/app-oss-release-unsigned.apk "ConnectBot-${TAG}-oss-release-unsigned.apk"
          cp ./app/build/outputs/apk/google/release/app-google-release-unsigned.apk "ConnectBot-${TAG}-google-release-unsigned.apk"
          cp ./app/build/outputs/apk/oss/debug/app-oss-debug.apk "ConnectBot-${TAG}-oss-debug.apk"
          cp ./app/build/outputs/apk/google/debug/app-google-debug.apk "ConnectBot-${TAG}-google-debug.apk"

      - name: Create alpha release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.prep.outputs.TAG }}
          name: "Alpha: FIDO2 (${{ steps.prep.outputs.TAG }})"
          prerelease: true
          body: |
            Automated alpha build from the `fido2` branch.

            Commit: ${{ github.sha }}
          files: |
            ConnectBot-*-release-unsigned.apk
            ConnectBot-*-debug.apk
