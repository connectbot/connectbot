name: Continuous Integration

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - '.java-version'
      - 'icons/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - '.java-version'
      - 'icons/**'
  schedule:
    - cron: "0 7 */3 * *"
  merge_group:
    types: [ checks_requested ]

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci-build.yml
    permissions:
      contents: write
    with:
      is_push: ${{ github.event_name == 'push' }}
    secrets: inherit
